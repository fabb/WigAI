name: Branch Policy Enforcement

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - 'develop/cycle-*'

permissions:
  contents: read
  pull-requests: read

jobs:
  enforce-branch-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect code changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'bitwig-api-doc-scraper/**'
              - 'gradle/**'
              - 'gradlew'
              - 'gradlew.bat'
              - 'gradle.properties'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - '**/*.kt'
              - '**/*.kts'
            workflows:
              - '.github/workflows/**'
            non_workflows:
              - '**'
              - '!.github/workflows/**'

      - name: Block workflow-only PRs to main (hotfix only)
        if: github.base_ref == 'main' && steps.filter.outputs.workflows == 'true' && steps.filter.outputs.non_workflows != 'true' && !startsWith(github.head_ref, 'hotfix/')
        run: |
          echo "❌ ERROR: Workflow-only PRs to 'main' must come from a 'hotfix/*' branch."
          echo ""
          echo "This prevents accidentally promoting an incomplete cycle to 'main' via workflow tweaks."
          echo ""
          echo "Options:"
          echo "  1) Create a hotfix branch and open PR to main:"
          echo "     - hotfix/<id>-<short-name>"
          echo "  2) Include the necessary code changes in the cycle PR (if this is a true cycle promotion)"
          exit 1

      - name: Block non-code cycle PRs to main
        if: startsWith(github.head_ref, 'develop/cycle-') && github.base_ref == 'main' && steps.filter.outputs.code != 'true' && !contains(github.event.pull_request.labels.*.name, 'allow-non-code-to-main')
        run: |
          echo "❌ ERROR: PRs from 'develop/cycle-*' to 'main' must include code changes."
          echo ""
          echo "This prevents accidentally promoting an incomplete cycle to 'main'."
          echo ""
          echo "Override (intentional, audited): add PR label 'allow-non-code-to-main'."
          echo ""
          echo "If this PR is intended to promote a completed cycle:"
          echo "  - ensure code changes are included (src/**, gradle/**, *.kts, etc.)"
          echo ""
          echo "If this PR is docs/config only:"
          echo "  - merge it into the cycle branch, but do NOT promote to main yet"
          exit 1

      - name: Check main branch PR source
        if: github.base_ref == 'main'
        run: |
          SOURCE="${{ github.head_ref }}"

          # Check if source matches allowed patterns for main
          if [[ "$SOURCE" =~ ^develop/cycle-[0-9]+$ ]] || [[ "$SOURCE" =~ ^hotfix/ ]]; then
            echo "✅ Valid: PR from '$SOURCE' to 'main'"
          else
            echo "❌ ERROR: PRs to 'main' must come from 'develop/cycle-*' or 'hotfix/*' branches"
            echo ""
            echo "Current PR:"
            echo "  Source: $SOURCE"
            echo "  Target: ${{ github.base_ref }}"
            echo ""
            echo "Allowed patterns:"
            echo "  - develop/cycle-<n> (cycle completion)"
            echo "  - hotfix/<id>-<short-name> (urgent production fixes)"
            echo ""
            echo "Examples:"
            echo "  - develop/cycle-2"
            echo "  - hotfix/42-critical-bug-fix"
            echo ""
            echo "See docs/engineering/git-workflow.md for branch naming conventions"
            exit 1
          fi

      - name: Check develop/cycle-* branch PR source
        if: startsWith(github.base_ref, 'develop/cycle-')
        run: |
          SOURCE="${{ github.head_ref }}"
          TARGET="${{ github.base_ref }}"

          # Extract cycle number from target branch
          CYCLE_NUM=$(echo "$TARGET" | grep -oP 'cycle-\K[0-9]+')

          # Check if source matches allowed patterns
          if [[ "$SOURCE" =~ ^feature/ ]] || \
             [[ "$SOURCE" =~ ^planning/cycle-${CYCLE_NUM}- ]] || \
             [[ "$SOURCE" =~ ^docs/ ]] || \
             [[ "$SOURCE" =~ ^hotfix/ ]]; then
            echo "✅ Valid: PR from '$SOURCE' to '$TARGET'"
          else
            echo "❌ ERROR: PRs to 'develop/cycle-*' must come from allowed branch patterns"
            echo ""
            echo "Current PR:"
            echo "  Source: $SOURCE"
            echo "  Target: $TARGET"
            echo ""
            echo "Allowed patterns for $TARGET:"
            echo "  - feature/<id>-<short-name>"
            echo "  - planning/cycle-${CYCLE_NUM}-<topic>"
            echo "  - docs/<short-name>"
            echo "  - hotfix/<id>-<short-name> (cherry-pick from main)"
            echo ""
            echo "See docs/engineering/git-workflow.md for branch naming conventions"
            exit 1
          fi
