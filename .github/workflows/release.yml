name: Release Extension

on:
  push:
    branches: [main]  # Automatic releases on main branch
  workflow_dispatch:  # Manual triggering

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write
  packages: write

jobs:
  # Build and test using reusable workflow
  # Tests/build are only run if not already verified by CI (e.g., manual triggers)
  build-and-test:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/build-and-test.yml
    with:
      upload-artifact: false

  # Release job runs after build (if triggered) or immediately (on merge from CI)
  release:
    runs-on: ubuntu-latest
    needs: [build-and-test]
    # Allow release to run even if build-and-test is skipped
    if: always() && (needs.build-and-test.result == 'success' || needs.build-and-test.result == 'skipped')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for Nyx
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Tests are already run in PR validation workflow and enforced via branch protection
      # For manual triggers, tests run in build-and-test job above

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Build extension with updated version
        run: ./gradlew clean build --warning-mode=none

      - name: Verify extension file exists
        run: |
          ls -la build/extensions/
          test -f build/extensions/WigAI.bwextension && echo "Extension file exists" || echo "Extension file missing!"

      - name: Nyx publish release with assets
        run: ./gradlew nyxPublish --warning-mode=none --stacktrace
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
